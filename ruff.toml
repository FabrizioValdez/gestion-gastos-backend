[lint]
select = [
    "E",     # pycodestyle errors
    "F",     # pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "SIM",   # flake8-simplify
]
ignore = [
    "E501",  # line too long
    "B008",  # do not perform function calls in argument defaults
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["S101"]
"core/settings/*.py" = ["F403", "F405"]
"core/settings/development.py" = ["F403", "F405"]
"core/settings/production.py" = ["F403", "F405"]

[format]
quote-style = "double"
indent-style = "space"
